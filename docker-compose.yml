services:
  backend:
    build: ./backend
    container_name: animal-dashboard-backend
    hostname: backend
    # ports:
    #   - "8002:8001"
    env_file:
      - ./backend/.env
    networks:
      - app-network
      - proxy_app-network
    restart: unless-stopped
    volumes:
      - ./backend/gmail_credentials:/app/backend/gmail_credentials
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    container_name: animal-dashboard-frontend
    hostname: frontend
    # ports:
    #   - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network
      - proxy_app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
  proxy_app-network:
    external: true
